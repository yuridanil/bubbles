<!DOCTYPE html>
<html>

<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Page Title</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <style>
        body {
            position: absolute;
            left: 0;
            right: 0;
            top: 0;
            bottom: 0;
            padding: 0;
            margin: 0;
            overflow: hidden;
        }
    </style>

    <script>
        let canvas;
        let ctx;
        let
            W,
            H,
            ITER,
            DEFAULT_SIZE = 32;
        let bubbles = [];
        let circles = [];
        let seatop = "#008090";
        let seabottom = "#003040";

        const getBubble = (opacity) => {
            const svgString = `<svg xmlns="http://www.w3.org/2000/svg" width="${DEFAULT_SIZE}" height="${DEFAULT_SIZE}">
            <circle cx="${DEFAULT_SIZE / 2}" cy="${DEFAULT_SIZE / 2}" r="${Math.floor(DEFAULT_SIZE / 30) * 10}" fill="#ffffff" style="opacity:${opacity}; filter:drop-shadow(4px 6px 1px #ff664488) drop-shadow(-2px -4px 1px #44ffffff) blur(2px)"/>
            </svg>`;
            return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgString);
        }

        let bubbleImages = [];
        for (let i = 0.1; i < 0.7; i += 0.1) {
            let img = new Image();
            img.src = getBubble(i);
            bubbleImages.push(img);
        }

        const initBubbles = () => {
            for (let i = 0; i < ITER; i++) {
                bubbles.push([
                    Math.floor(Math.random() * W), // x
                    Math.floor(Math.random() * H), // y
                    Math.random(), // r
                    Math.floor(Math.random() * bubbleImages.length), // imageIndex
                    0.5 + Math.random() * 0.5 // personal speed
                ]);
            }
            for (let i = 0; i < 10; i++) {
                circles.push([
                    Math.floor(Math.random() * W), // x
                    Math.random() * H / 8, // y
                    Math.random() * 150, // r
                    (1 - Math.random() * 2) * 1.1 // dx
                ]);
            }
        }

        const draw = () => {
            const grad = ctx.createLinearGradient(0, 0, 0, H);
            grad.addColorStop(0, seatop);
            grad.addColorStop(1, seabottom);
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
/*
            let R = 2000;
            ctx.shadowColor = "#ffffff";
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = 0;
            ctx.shadowBlur = 4;
            circles.forEach(e => {
                ctx.strokeStyle = "#999999";
                ctx.beginPath();
                ctx.arc(e[0], -R + e[1], R, 0, Math.PI);
                ctx.stroke();
                e[0] = e[0] + e[3] * 5;
                if (e[0] < 0 || e[0] > W)
                    e[3] = - e[3];
            });
*/
            bubbles.forEach(e => {
                ctx.drawImage(bubbleImages[e[3]], e[0], e[1], DEFAULT_SIZE * e[2], DEFAULT_SIZE * e[2]);
                e[1] = Math.floor(e[1] - e[2] * 3 * e[4]);
                if (e[2] > 0.3)
                    e[0] = e[0] + (1.0 - Math.random() * 2);
                if (e[1] < -DEFAULT_SIZE) { // make a new bubble out of an old one
                    e[1] = H + DEFAULT_SIZE;
                    e[0] = Math.floor(Math.random() * W);
                }

            });
            window.requestAnimationFrame(draw);
        }

        window.onresize = () => {

            W = document.body.clientWidth;
            H = document.body.clientHeight;
            canvas.width = document.body.clientWidth;
            canvas.height = document.body.clientHeight;
        }

        window.onload = () => {
            W = document.body.clientWidth;
            H = document.body.clientHeight;
            ITER = 100;

            canvas = document.getElementById("canvas");
            canvas.width = document.body.clientWidth;
            canvas.height = document.body.clientHeight;
            ctx = canvas.getContext("2d");
            initBubbles();

            window.requestAnimationFrame(draw);
        }
    </script>
</head>

<body>
    <canvas id="canvas"></canvas>

</body>

</html>
